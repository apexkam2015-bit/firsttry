<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Моё Telegram Mini App</title>
    <!-- Подключаем официальную библиотеку Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Используем переменные темы Telegram для автоматической подстройки */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
        }
        button {
            background-color: var(--tg-theme-button-color, #2e7daf);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }
        .user-info {
            margin: 20px 0;
            padding: 15px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 8px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 4px;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать!</h1>
    
    <div class="user-info" id="userInfo">
        Загрузка данных пользователя...
    </div>
    
    <input type="text" id="messageInput" placeholder="Введите сообщение для бота">
    
    <button id="sendDataBtn">Отправить данные боту</button>
    <button id="closeBtn">Закрыть приложение</button>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
        
        // Растягиваем на весь доступный экран
        tg.expand();

        // Получаем информацию о пользователе
        const user = tg.initDataUnsafe?.user;
        const userInfoDiv = document.getElementById('userInfo');
        
        if (user) {
            userInfoDiv.innerHTML = `
                <strong>Привет, ${user.first_name}!</strong><br>
                Ваш ID: ${user.id}<br>
                ${user.username ? `Username: @${user.username}` : ''}<br>
                Язык: ${user.language_code}
            `;
        } else {
            userInfoDiv.innerHTML = 'Не удалось получить данные пользователя. Убедитесь, что вы открыли приложение через Telegram.';
        }

        // Обработка кнопки отправки данных
        document.getElementById('sendDataBtn').addEventListener('click', function() {
            const input = document.getElementById('messageInput').value;
            if (!input) {
                tg.showAlert('Пожалуйста, введите сообщение');
                return;
            }
            
            // Отправляем данные боту (приложение закроется автоматически)
            tg.sendData(JSON.stringify({
                action: 'userMessage',
                text: input,
                userId: user?.id
            }));
        });

        // Кнопка закрытия приложения
        document.getElementById('closeBtn').addEventListener('click', function() {
            tg.close();
        });

        // Настройка основной кнопки Telegram (внизу интерфейса)
        tg.MainButton.setText('Отправить').onClick(function() {
            const input = document.getElementById('messageInput').value;
            if (!input) {
                tg.showAlert('Введите сообщение');
                return;
            }
            tg.sendData(JSON.stringify({
                action: 'userMessage',
                text: input,
                userId: user?.id
            }));
        });
        tg.MainButton.show();
    </script>
</body>
</html>
